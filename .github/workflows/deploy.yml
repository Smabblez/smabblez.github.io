name: Deploy website to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Check sitemap freshness
        run: node scripts/generate-sitemap.mjs --check

      - name: Prepare static site artifact
        run: |
          mkdir -p _site
          cp about.html analytics.js gta-rp.html index.html media-kit.html music.html robots.txt sitemap.xml styles.css script.js site.config.js .nojekyll _site/
          cp -R assets _site/assets

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
